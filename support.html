<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — Notes NGX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #F5A623;
      --amber:  #E07B00;
      --deep:   #B85C00;
      --fire:   #FF6B00;
      --cream:  #FFF8EE;
      --dark:   #1A0F00;
      --border: rgba(245,166,35,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.5;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(26,15,0,0.9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }

    .nav-left { display: flex; align-items: center; gap: 9px; }
    .nav-icon { color: var(--gold); display: flex; align-items: center; }
    .nav-icon svg { width: 20px; height: 20px; }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--fire));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -0.02em;
    }

    .nav-badge {
      display: flex; align-items: center; gap: 5px;
      background: linear-gradient(135deg, var(--gold), var(--fire));
      color: var(--dark); font-size: 0.62rem; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 11px; border-radius: 20px;
    }
    .nav-badge svg { width: 11px; height: 11px; }

    /* ── HERO ── */
    .hero {
      position: relative;
      padding: 24px 24px 64px;
      text-align: center; overflow: hidden;
      min-height: auto;
      display: flex; flex-direction: column; align-items: center;
    }

    .hero::before {
      content: '';
      position: absolute; top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(245,166,35,0.2) 0%, transparent 68%);
      border-radius: 50%;
    }

    /* floating orb bottom right */
    .hero::after {
      content: '';
      position: absolute; bottom: -100px; right: -80px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(255,107,0,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-tag {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border);
      color: var(--gold); font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 7px 16px; border-radius: 20px; margin-bottom: 20px;
      background: rgba(245,166,35,0.07);
      animation: fadeUp 0.6s ease both;
      position: relative; z-index: 1;
    }
    .hero-tag svg { width: 13px; height: 13px; }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 10vw, 3.6rem);
      font-weight: 900; line-height: 1.08; letter-spacing: -0.03em;
      margin-bottom: 18px;
      animation: fadeUp 0.7s 0.1s ease both;
      position: relative; z-index: 1;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--gold) 20%, var(--fire));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .hero p {
      color: rgba(255,248,238,0.58);
      font-size: 1rem; line-height: 1.7;
      max-width: 340px; margin: 0 auto 32px; font-weight: 300;
      animation: fadeUp 0.7s 0.2s ease both;
      position: relative; z-index: 1;
    }

    .hero-cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--gold), var(--fire));
      color: var(--dark); font-weight: 700; font-size: 0.92rem;
      padding: 15px 30px; border-radius: 50px; text-decoration: none;
      box-shadow: 0 8px 36px rgba(245,166,35,0.42);
      animation: fadeUp 0.7s 0.3s ease both;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative; z-index: 1;
    }
    .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 14px 44px rgba(245,166,35,0.58); }
    .hero-cta svg { width: 16px; height: 16px; }

    /* scroll hint */
    .scroll-hint {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: rgba(245,166,35,0.4); z-index: 1;
      animation: bounce 2s infinite;
    }
    .scroll-hint svg { width: 20px; height: 20px; }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 0 20px;
    }

    /* ── SUBJECT SECTION ── */
    .section { padding: 48px 20px; position: relative; z-index: 1; }

    .section-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 6px;
    }
    .section-label svg { width: 13px; height: 13px; }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.65rem; font-weight: 900;
      letter-spacing: -0.02em; margin-bottom: 6px; line-height: 1.2;
    }

    .section-desc {
      font-size: 0.82rem; color: rgba(255,248,238,0.45);
      margin-bottom: 24px; line-height: 1.6;
    }

    /* ── SUBJECT OVERVIEW CARDS ── */
    .subject-grid { display: flex; flex-direction: column; gap: 16px; }

    .subject-card {
      border-radius: 22px; padding: 26px 22px;
      position: relative; overflow: hidden;
      text-decoration: none; color: var(--cream);
      display: block;
      transition: transform 0.2s;
    }
    .subject-card:hover { transform: translateY(-3px); }

    .subject-card.phys {
      background: linear-gradient(135deg, rgba(245,166,35,0.14), rgba(255,107,0,0.09));
      border: 1px solid rgba(245,166,35,0.4);
    }
    .subject-card.chem {
      background: linear-gradient(135deg, rgba(80,200,120,0.12), rgba(0,180,80,0.07));
      border: 1px solid rgba(80,200,120,0.35);
    }
    .subject-card.math {
      background: linear-gradient(135deg, rgba(100,160,255,0.12), rgba(60,100,255,0.07));
      border: 1px solid rgba(100,160,255,0.35);
    }

    .subject-card::after {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 110px; height: 110px; border-radius: 50%;
    }
    .subject-card.phys::after { background: radial-gradient(circle, rgba(245,166,35,0.22), transparent 70%); }
    .subject-card.chem::after { background: radial-gradient(circle, rgba(80,200,120,0.18), transparent 70%); }
    .subject-card.math::after { background: radial-gradient(circle, rgba(100,160,255,0.18), transparent 70%); }

    .subject-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }

    .subject-icon {
      width: 44px; height: 44px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .subject-card.phys .subject-icon { background: rgba(245,166,35,0.15); color: var(--gold); }
    .subject-card.chem .subject-icon { background: rgba(80,200,120,0.15); color: #50C878; }
    .subject-card.math .subject-icon { background: rgba(100,160,255,0.15); color: #64A0FF; }
    .subject-icon svg { width: 22px; height: 22px; }

    .subject-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; font-weight: 900; letter-spacing: -0.01em;
    }

    .subject-tag {
      margin-left: auto;
      font-size: 0.62rem; font-weight: 700;
      padding: 4px 10px; border-radius: 12px;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .subject-card.phys .subject-tag { background: rgba(245,166,35,0.15); color: var(--gold); }
    .subject-card.chem .subject-tag { background: rgba(80,200,120,0.15); color: #50C878; }
    .subject-card.math .subject-tag { background: rgba(100,160,255,0.15); color: #64A0FF; }

    .subject-desc {
      font-size: 0.8rem; color: rgba(255,248,238,0.5);
      line-height: 1.6; margin-bottom: 16px;
    }

    .subject-pills { display: flex; flex-wrap: wrap; gap: 7px; }

    .pill {
      font-size: 0.68rem; font-weight: 500;
      padding: 4px 11px; border-radius: 20px;
    }
    .subject-card.phys .pill { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2); color: var(--gold); }
    .subject-card.chem .pill { background: rgba(80,200,120,0.1); border: 1px solid rgba(80,200,120,0.2); color: #50C878; }
    .subject-card.math .pill { background: rgba(100,160,255,0.1); border: 1px solid rgba(100,160,255,0.2); color: #64A0FF; }

    .subject-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 18px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .subject-meta { font-size: 0.72rem; color: rgba(255,248,238,0.35); }

    .subject-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.75rem; font-weight: 700;
      padding: 7px 14px; border-radius: 20px;
      text-decoration: none;
    }
    .subject-card.phys .subject-btn { background: rgba(245,166,35,0.15); color: var(--gold); }
    .subject-card.chem .subject-btn { background: rgba(80,200,120,0.15); color: #50C878; }
    .subject-card.math .subject-btn { background: rgba(100,160,255,0.15); color: #64A0FF; }
    .subject-btn svg { width: 13px; height: 13px; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px; text-align: center;
    }
    .footer-logo-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 14px;
    }
    .footer-logo-wrap svg { width: 18px; height: 18px; color: var(--gold); }
    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--fire));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .footer-links {
      display: flex; justify-content: center; gap: 32px; margin-bottom: 14px;
    }
    .footer-link {
      color: rgba(255,248,238,0.38);
      transition: color 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.04em;
      cursor: pointer;
    }
    .footer-link svg { width: 20px; height: 20px; }
    .footer-link:hover { color: var(--gold); }
    .footer-copy { font-size: 0.7rem; color: rgba(255,248,238,0.2); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section > * { animation: fadeUp 0.6s ease both; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--amber); border-radius: 4px; }
  

    /* ── SUPPORT PAGE EXTRA STYLES ── */
    .support-hero {
      position: relative;
      padding: 24px 24px 48px;
      text-align: center;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 70vh;
      justify-content: center;
    }

    .support-hero::before {
      content: '';
      position: absolute; top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 68%);
      border-radius: 50%;
    }

    .support-card {
      background: rgba(255,243,220,0.04);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
      margin: 0 auto;
      transition: transform 0.3s, border-color 0.3s;
    }

    .support-card:hover {
      transform: translateY(-4px);
      border-color: rgba(245,166,35,0.5);
    }

    .support-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(245,166,35,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 24px;
    }

    .support-card:hover::before {
      opacity: 1;
    }

    .telegram-icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(245,166,35,0.15), rgba(224,123,0,0.1));
      border: 1px solid rgba(245,166,35,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      position: relative;
      z-index: 1;
    }

    .telegram-icon-wrap svg {
      width: 40px;
      height: 40px;
      color: var(--gold);
    }

    .support-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .support-card p {
      color: rgba(255,248,238,0.55);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .telegram-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--gold), var(--amber));
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 16px 36px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 36px rgba(245,166,35,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      z-index: 1;
    }

    .telegram-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 44px rgba(245,166,35,0.5);
    }

    .telegram-btn svg {
      width: 20px;
      height: 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,248,238,0.4);
      font-size: 0.8rem;
      margin-top: 32px;
      transition: color 0.2s;
      position: relative;
      z-index: 1;
      cursor: pointer;
    }

    .back-link:hover {
      color: var(--gold);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
    }

    .support-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      color: var(--gold);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
      background: rgba(245,166,35,0.07);
      position: relative;
      z-index: 1;
    }

    .support-tag svg {
      width: 13px;
      height: 13px;
    }
  </style>
<base target="_blank">
</head>

  <!-- NAV -->
  <nav>
    <div class="nav-left">
      <div class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/><path d="M10 2v8l3-2 3 2V2"/></svg></div>

      <div class="back-link" onclick="window.location.href='index.html'">

  <!-- FOOTER -->
  <footer>

      <div class="footer-link" onclick="window.location.href='about.html'" title="About">

        <span>About</span>
      </div>
    </div>
    <div class="footer-copy">© 2026 Notes NGX. All rights reserved.</div>
